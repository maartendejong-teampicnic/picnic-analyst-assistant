# Agent registry — ORCHESTRATOR reads this at startup to discover available agents.
# To add a new agent: run /add-agent (guided) or add an entry manually + create the agent file.

agents:
  - role: ANALYST
    file: ANALYST.md
    output_type: Snowflake queries, analyses, A/B design
    spawns_when: data questions, metrics, experiments, Google Sheets 

  - role: ENGINEER
    file: ENGINEER.md
    output_type: dbt models, GitHub PRs, CI validation
    spawns_when: GitHub repository code changes, Edge or DBT models, Calcite queries, PRs

  - role: WRITER
    file: WRITER.md
    output_type: Slack drafts, Confluence pages
    spawns_when: any written communication output needed

  - role: PRESENTER
    file: PRESENTER.md
    output_type: Slide decks (.pptx), think-cell charts
    spawns_when: output requires slides or charts

  - role: DESIGNER
    file: DESIGNER.md
    output_type: Diagrams (.excalidraw)
    spawns_when: output requires a visual diagram
